<!DOCTYPE html>
<html lang="ru">

</head>

<body>

<header>

<main>

<h1>Devlog</h1>

<section id="devlog-container"></section>

</main>

<footer>

    © 2026 Dark |
    <a href="https://github.com/DarkRouteS22">GitHub</a> |
    <a href="https://t.me/dark_22dev">Telegram</a>
  </p>
</footer>

<script>

fetch("devlog/devlog.json")
  .then(response => response.json())
  .then(logs => {

    const container = document.getElementById("devlog-container");

    logs.forEach(log => {

      const entry = document.createElement("div");
      entry.className = "log";

      entry.innerHTML = `
        <div class="log-date">${log.date}</div>
        <h2>${log.title}</h2>
        <p>${log.text}</p>
      `;

      container.appendChild(entry);

    });

  });

</script>

</body>
</html>
