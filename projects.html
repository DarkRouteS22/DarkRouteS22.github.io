<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark – Portfolio</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html">Главная</a>
      <a href="projects.html">Проекты</a>
      <a href="about.html ">Обо мне</a>
    </nav>
  </header>

    <main>
        <h1>Мои проекты</h1>

        <section id="projects-container"></section>
    </main>

    <script>
    fetch("projects/projects.json")
    .then(response => response.json())
    .then(projects => {

        const container = document.getElementById("projects-container");

        projects.forEach(project => {

        const card = document.createElement("div");
        card.className = "project";

        let imageHTML = "";

        if (project.image) {
            imageHTML = `<img src="${project.image}" class="project-image">`;
        }

        card.innerHTML = `
            <h2>${project.title}</h2>
            ${imageHTML}
            <p>${project.description}</p>
            <a href="${project.link}">Читать</a>
        `;

        container.appendChild(card);

        });

    });
    </script>

  <footer>
    <p>
        © 2026 Dark |
        <a href="https://github.com/DarkRouteS22" target="_blank">GitHub</a> |
        <a href="https://t.me/dark_22dev" target="_blank">Telegram</a>
    </p>
  </footer>
</body>

</html>
